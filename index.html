<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — Amna's RSVPs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet" />
    <style>
        /* ═══════════════════════════════════════════════
       ADMIN DASHBOARD STYLES
    ═══════════════════════════════════════════════ */
        :root {
            --pink: #f8c8d4;
            --pink-deep: #e8a0b8;
            --pink-soft: #fde8ef;
            --gold: #d4a843;
            --gold-light: #f0d080;
            --gold-pale: #fdf3d8;
            --ivory: #fdf6ee;
            --cream: #faf4f0;
            --rose: #c97a8a;
            --rose-dark: #a85a6a;
            --text-dark: #3a2a2e;
            --text-mid: #6b4a58;
            --text-light: #9a7a88;
            --white: #ffffff;
            --shadow-sm: 0 4px 12px rgba(200, 120, 140, .08);
            --shadow-md: 0 8px 24px rgba(200, 120, 140, .12);
            --radius-sm: 12px;
            --radius-md: 20px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
            background: var(--ivory);
            color: var(--text-dark);
            overflow-y: scroll;
        }

        /* ─── TOP BAR ─── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 70px;
            background: rgba(253, 246, 238, .92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 168, 67, .15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, .03);
        }

        .topbar-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--rose-dark);
            letter-spacing: .05em;
        }

        .topbar-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: .85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-mid);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 50px;
            border: 1.5px solid rgba(201, 122, 138, .25);
            transition: all .2s ease;
        }

        .topbar-back:hover {
            background: var(--pink-soft);
            color: var(--rose-dark);
            border-color: var(--pink-deep);
        }

        /* ─── MAIN LAYOUT ─── */
        .dashboard-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 48px;
            position: relative;
        }

        .dashboard-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .dashboard-title em {
            font-style: italic;
            color: var(--rose-dark);
        }

        .dashboard-subtitle {
            font-size: 1.05rem;
            color: var(--text-light);
        }

        /* ─── STATS CARDS ─── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 30px 24px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(248, 200, 212, .3);
        }

        .stat-card.total {
            border-color: var(--gold);
            background: linear-gradient(135deg, var(--white), var(--gold-pale));
        }

        .stat-card.attending {
            border-color: #8db596;
            background: linear-gradient(135deg, var(--white), #f0f7f2);
        }

        .stat-card.declined {
            border-color: var(--rose);
            background: linear-gradient(135deg, var(--white), var(--pink-soft));
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .stat-label {
            font-size: .85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .15em;
            color: var(--text-light);
        }

        .stat-card.attending .stat-value {
            color: #5a8a65;
        }

        .stat-card.declined .stat-value {
            color: var(--rose-dark);
        }

        .stat-card.total .stat-value {
            color: var(--gold);
        }

        /* ─── CONTROLS ─── */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .filter-tabs {
            display: flex;
            background: var(--white);
            border-radius: 50px;
            padding: 4px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(248, 200, 212, .4);
        }

        .filter-tab {
            padding: 10px 24px;
            border: none;
            background: transparent;
            border-radius: 50px;
            font-family: 'Lato', sans-serif;
            font-size: .85rem;
            font-weight: 700;
            color: var(--text-light);
            cursor: pointer;
            transition: all .2s ease;
        }

        .filter-tab.active {
            background: var(--pink-soft);
            color: var(--rose-dark);
        }

        .filter-tab.active-green {
            background: #e8f3ea;
            color: #3e6b48;
        }

        .filter-tab.active-red {
            background: #fae0e4;
            color: #a32a3d;
        }

        .btn-clear {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Lato', sans-serif;
            font-size: .85rem;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            border: 1px solid rgba(201, 122, 138, .3);
            color: var(--rose-dark);
            transition: all .2s ease;
        }

        .btn-clear:hover {
            background: var(--pink-soft);
            border-color: var(--rose);
        }

        /* ─── DATA TABLE ─── */
        .table-container {
            background: var(--white);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(248, 200, 212, .3);
            padding: 24px;
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .data-table th,
        .data-table td {
            padding: 18px 16px;
            text-align: left;
        }

        .data-table th {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--text-light);
            border-bottom: 2px solid var(--pink-soft);
        }

        .data-table td {
            font-size: .95rem;
            color: var(--text-dark);
            border-bottom: 1px solid rgba(248, 200, 212, .2);
            vertical-align: top;
        }

        .data-table tbody tr:hover td {
            background: var(--cream);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Table specifics */
        .col-status {
            width: 80px;
        }

        .col-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 600;
            width: 220px;
        }

        .col-guests {
            font-weight: 700;
            text-align: center;
            width: 90px;
        }

        .col-diet {
            width: 140px;
        }

        .col-msg {
            font-style: italic;
            color: var(--text-mid);
        }

        .badge-status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border-radius: 50px;
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-yes {
            background: #e8f3ea;
            color: #3e6b48;
        }

        .badge-no {
            background: #fae0e4;
            color: #a32a3d;
        }

        .stars {
            color: var(--gold);
            letter-spacing: 2px;
        }

        .diet-tag {
            display: inline-block;
            padding: 4px 10px;
            background: var(--ivory);
            border: 1px solid rgba(212, 168, 67, .3);
            border-radius: 4px;
            font-size: .75rem;
            font-weight: 600;
            color: var(--text-mid);
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .message-bubble {
            background: var(--pink-soft);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border-top-left-radius: 4px;
            font-size: .9rem;
            line-height: 1.5;
        }

        .datetime {
            display: block;
            font-size: .75rem;
            color: var(--text-light);
            margin-top: 6px;
            font-weight: normal;
            font-family: 'Lato', sans-serif;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--text-mid);
            margin: 16px 0 8px;
        }

        .empty-emoji {
            font-size: 3rem;
            opacity: .5;
        }

        @media (max-width: 768px) {
            .topbar {
                padding: 0 20px;
                height: 60px;
            }

            .dashboard-container {
                padding: 32px 16px 60px;
            }

            .table-container {
                padding: 16px 0;
                border-radius: var(--radius-sm);
            }

            .data-table th:first-child,
            .data-table td:first-child {
                padding-left: 16px;
            }

            .data-table th:last-child,
            .data-table td:last-child {
                padding-right: 16px;
            }
        }
    </style>
</head>

<body>

    <!-- ── TOP BAR ── -->
    <header class="topbar">
        <div class="topbar-logo">✦ Admins Only ✦</div>
        <a href="index.html" class="topbar-back">
            ← Back to Site
        </a>
    </header>

    <main class="dashboard-container">
        <header class="dashboard-header">
            <h1 class="dashboard-title">RSVP <em>Responses</em></h1>
            <p class="dashboard-subtitle">Here is who has replied to Amna's 18th Birthday Invitation so far.</p>
        </header>

        <!-- ── STATS CARDS ── -->
        <div class="stats-grid">
            <div class="stat-card total">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total Responses</div>
            </div>
            <div class="stat-card attending">
                <div class="stat-value" id="statAttending">0</div>
                <div class="stat-label">Attending Groups</div>
            </div>
            <div class="stat-card attending">
                <div class="stat-value" id="statGuests">0</div>
                <div class="stat-label">Total Guests Count</div>
            </div>
            <div class="stat-card declined">
                <div class="stat-value" id="statDeclined">0</div>
                <div class="stat-label">Declined</div>
            </div>
        </div>

        <!-- ── CONTROLS ── -->
        <div class="controls-bar">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="yes">Attending only</button>
                <button class="filter-tab" data-filter="no">Declined only</button>
            </div>
            <button class="btn-clear" id="clearData" title="Delete all RSVPs forever">
                🗑️ Clear Data
            </button>
        </div>

        <!-- ── TABLE ── -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th class="col-status">Status</th>
                        <th class="col-name">Name</th>
                        <th class="col-guests">Guests</th>
                        <th class="col-diet">Dietary</th>
                        <th>Message &amp; Extra Info</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Rows injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tableBody = document.getElementById('tableBody');
            const statTotal = document.getElementById('statTotal');
            const statAttending = document.getElementById('statAttending');
            const statGuests = document.getElementById('statGuests');
            const statDeclined = document.getElementById('statDeclined');
            const filterTabs = document.querySelectorAll('.filter-tab');

            let responses = [];
            let currentFilter = 'all';

            // Load data
            function loadData() {
                const raw = localStorage.getItem('rsvpResponses');
                responses = raw ? JSON.parse(raw) : [];
                // Sort newest first
                responses.sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
                updateStats();
                renderTable();
            }

            // Update Top Stats
            function updateStats() {
                statTotal.textContent = responses.length;

                let attendingGroups = 0;
                let totalGuests = 0;
                let declined = 0;

                responses.forEach(r => {
                    if (r.attend === 'yes') {
                        attendingGroups++;
                        totalGuests += parseInt(r.guests || 1, 10);
                    } else {
                        declined++;
                    }
                });

                statAttending.textContent = attendingGroups;
                statGuests.textContent = totalGuests;
                statDeclined.textContent = declined;
            }

            // Render Table Rows
            function renderTable() {
                tableBody.innerHTML = '';

                const filtered = responses.filter(r => {
                    if (currentFilter === 'all') return true;
                    return r.attend === currentFilter;
                });

                if (filtered.length === 0) {
                    tableBody.innerHTML = `
            <tr>
              <td colspan="5">
                <div class="empty-state">
                  <div class="empty-emoji">📫</div>
                  <h3>No responses yet.</h3>
                  <p>When guests fill out the RSVP form, they will appear here.</p>
                </div>
              </td>
            </tr>
          `;
                    return;
                }

                filtered.forEach(r => {
                    const tr = document.createElement('tr');

                    // Format date if exists
                    let dateStr = '';
                    if (r.timestamp) {
                        const date = new Date(r.timestamp);
                        dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    }

                    // Build Name Display
                    const fullName = (r.firstName + ' ' + (r.lastName || '')).trim();

                    // Status Badge
                    const statusBadge = r.attend === 'yes'
                        ? '<span class="badge-status badge-yes">✓ YES</span>'
                        : '<span class="badge-status badge-no">✕ NO</span>';

                    // Guests
                    const guestsStr = r.attend === 'yes' ? (r.guests || '1') : '—';

                    // Diet Tags
                    let dietHTML = '—';
                    if (r.diets && r.diets.length > 0) {
                        dietHTML = r.diets.map(d => {
                            if (d === 'halal') return '<span class="diet-tag">🥩 Halal</span>';
                            if (d === 'vegetarian') return '<span class="diet-tag">🥗 Veg</span>';
                            if (d === 'none') return '<span class="diet-tag">😋 None</span>';
                            return `<span class="diet-tag">${d}</span>`;
                        }).join('');
                    }

                    // Message & Extras
                    let msgHTML = '';
                    if (r.stars && r.stars > 0) {
                        msgHTML += `<div class="stars" style="margin-bottom:8px">` + '⭐'.repeat(r.stars) + `</div>`;
                    }
                    if (r.message) {
                        msgHTML += `<div class="message-bubble">${r.message.replace(/</g, '&lt;')}</div>`;
                    }
                    if (r.phone) {
                        msgHTML += `<div style="font-size:0.85rem; color:var(--text-mid); margin-top:8px">📞 ${r.phone}</div>`;
                    }
                    if (!msgHTML) msgHTML = '<span style="color:#d4a843; opacity:0.6">—</span>';

                    tr.innerHTML = `
            <td>${statusBadge}</td>
            <td class="col-name">${fullName}<span class="datetime">${dateStr}</span></td>
            <td class="col-guests">${guestsStr}</td>
            <td class="col-diet">${dietHTML}</td>
            <td class="col-msg">${msgHTML}</td>
          `;
                    tableBody.appendChild(tr);
                });
            }

            // Filter clicks
            filterTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // Update visual active classes
                    filterTabs.forEach(t => t.className = 'filter-tab');
                    if (tab.dataset.filter === 'all') tab.classList.add('active');
                    if (tab.dataset.filter === 'yes') tab.classList.add('active-green');
                    if (tab.dataset.filter === 'no') tab.classList.add('active-red');

                    currentFilter = tab.dataset.filter;
                    renderTable();
                });
            });

            // Clear data
            document.getElementById('clearData').addEventListener('click', () => {
                if (confirm("Are you sure you want to delete ALL responses? This cannot be undone.")) {
                    localStorage.removeItem('rsvpResponses');
                    loadData();
                }
            });

            // Initial load
            loadData();
        });
    </script>
</body>

</html>
